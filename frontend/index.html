<!DOCTYPE html>
<html>
<head>
  <title>My E-Commerce Store</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <h1>MyFashionStore</h1>

  <div class="nav-links">

    <!-- 👤 USER INFO -->
    <span id="userInfo"></span>

    <!-- LOGIN -->
    <a href="login.html" id="loginLink">Login 🔐</a>

    <!-- 🛒 CART WITH BADGE -->
    <a href="cart.html" id="cartLink">
      Cart 🛒 <span id="cartCount">0</span>
    </a>

    <!-- 🚪 LOGOUT -->
    <button id="logoutBtn" style="display:none;">Logout</button>

  </div>
</header>


<!-- HERO -->
<section class="hero">
  <h2>Discover Your Style ✨</h2>
  <p>Trendy outfits • Affordable prices • Premium vibes</p>
  <button onclick="scrollToProducts()">Shop Now ↓</button>
</section>


<!-- PRODUCTS -->
<div id="products" class="product-container"></div>


<!-- IMAGE VIEW -->
<div id="imageViewer" onclick="closeImage()">
  <img id="viewerImg">
</div>


<script>

/// 🔽 SCROLL FUNCTION
function scrollToProducts() {
  document.getElementById("products").scrollIntoView({ behavior: "smooth" });
}


// 🔐 USER STATE
let name = localStorage.getItem("name");
let email = localStorage.getItem("email");
let token = localStorage.getItem("token");

// 👤 SHOW USER NAME
if (name) {
  document.getElementById("userInfo").innerText = "Hi, " + name + " 👋";
} else if (email) {
  document.getElementById("userInfo").innerText = "Hi, " + email + " 👋";
}

// 🔄 LOGIN / LOGOUT UI
if (token) {
  document.getElementById("loginLink").style.display = "none";
  document.getElementById("logoutBtn").style.display = "inline-block";
}


// 🚪 LOGOUT
document.getElementById("logoutBtn").onclick = function () {

  localStorage.clear();

  showToast("Logged out 👋");

  setTimeout(() => {
    location.reload();
  }, 800);
};


// 🔢 CART COUNT BADGE
function updateCartCount() {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let count = 0;

  cart.forEach(item => {
    if (typeof item === "string") {
      count += 1; // old format
    } else {
      count += item.qty; // new format
    }
  });

  document.getElementById("cartCount").innerText = count;
}

// run on page load
updateCartCount();


// 🔔 TOAST
function showToast(message) {
  let toast = document.createElement("div");
  toast.innerText = message;

  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.right = "20px";
  toast.style.background = "#111827";
  toast.style.color = "white";
  toast.style.padding = "10px 15px";
  toast.style.borderRadius = "8px";
  toast.style.borderLeft = "4px solid #fbbf24";
  toast.style.zIndex = "999";

  document.body.appendChild(toast);

  setTimeout(() => toast.remove(), 2000);
}

</script>


<!-- MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
