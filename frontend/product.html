<!DOCTYPE html>
<html>
<head>
  <title>Product Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #0f172a);
      color: white;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(15px);
    }

    header h1 {
      color: #fbbf24;
    }

    header a {
      color: #cbd5e1;
      text-decoration: none;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      display: flex;
      gap: 30px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .image-box img {
      width: 350px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .image-box img:hover {
      transform: scale(1.05);
    }

    .details {
      flex: 1;
      text-align: left;
    }

    .details h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      color: #fbbf24;
      margin: 10px 0;
    }

    .desc {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .back {
      display: block;
      margin-top: 15px;
      color: #cbd5e1;
      text-decoration: none;
    }

    .back:hover {
      color: #fbbf24;
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .image-box img {
        width: 100%;
      }

      .details {
        text-align: center;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>My Store</h1>
  <a href="index.html">← Back</a>
</header>

<div class="container" id="productDetails"></div>

<script>

// 📌 GET PRODUCT ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");


// 📦 FETCH PRODUCT
fetch("http://localhost:5000/products")
  .then(res => res.json())
  .then(data => {

    const product = data.find(p => p._id == id);

    if (!product) {
      document.getElementById("productDetails").innerHTML = "Product not found ❌";
      return;
    }

    document.getElementById("productDetails").innerHTML = `
      <div class="image-box">
        <img src="${product.image}" 
             onerror="this.src='https://via.placeholder.com/300'">
      </div>

      <div class="details">
        <h2>${product.name}</h2>
        <div class="price">₹${product.price}</div>

        <p class="desc">
          ${product.description || "Premium quality product for your perfect style."}
        </p>

        <button onclick="addToCart('${product._id}')">
          Add to Cart 🛒
        </button>

        <a href="index.html" class="back">← Continue Shopping</a>
      </div>
    `;
  });


// 🛒 FINAL ADD TO CART (CONSISTENT)
function addToCart(id) {

  if (!localStorage.getItem("token")) {
    showToast("Please login first 🔐");
    setTimeout(() => window.location.href = "login.html", 1000);
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  // 🔥 FIX OLD DATA FORMAT
  if (cart.length && typeof cart[0] === "string") {
    cart = [];
  }

  let existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id: id, qty: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  showToast("Added to cart 🛒");
}


// 🔔 TOAST
function showToast(message) {
  let toast = document.createElement("div");
  toast.innerText = message;

  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.right = "20px";
  toast.style.background = "#111827";
  toast.style.color = "white";
  toast.style.padding = "10px 15px";
  toast.style.borderRadius = "8px";
  toast.style.borderLeft = "4px solid #fbbf24";
  toast.style.zIndex = "999";

  document.body.appendChild(toast);

  setTimeout(() => toast.remove(), 2000);
}

</script>

</body>
</html>
